services:
  bot:
    image: docker.io/${DOCKERHUB_USERNAME}/linux-quiz-bot:${IMAGE_TAG}
    container_name: linux-quiz-bot-prod
    restart: unless-stopped
    env_file: .env.prod
    environment:
      DB_PATH: /data/quiz_bot.db
    volumes:
      - linux-quiz-bot-prod-data:/data

volumes:
  linux-quiz-bot-prod-data:
